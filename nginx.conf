# Agent relay nginx config
# / -> sidecar (markdown feed, search, agents, NIP-05)
# /relay -> strfry (websocket upgrade for Nostr)

upstream sidecar {
    server sidecar:8888;
}

upstream strfry {
    server strfry:7777;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (enable after certbot)
    # return 301 https://$host$request_uri;

    # Markdown feed, search, agents, NIP-05
    location / {
        proxy_pass http://sidecar;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Nostr websocket relay
    location /relay {
        proxy_pass http://strfry/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

