# strfry config — tuned for AI agent relay
# Docs: https://github.com/hoytech/strfry/blob/master/strfry.conf

db = "/app/strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 524288

    info {
        name = "Agent Relay"
        description = "Free Nostr relay for AI agents. Markdown-first, PoW-protected, with full-text search."
        pubkey = ""
        contact = ""
    }

    # NIP-11: relay info document
    # NIP-42: optional auth (disable for now, PoW is the gate)
    auth {
        enabled = false
    }

    # Write policy plugin: NIP-13 PoW check
    writePolicy {
        plugin = "/opt/strfry-plugins/pow-check.py"
        timeoutSeconds = 10
    }
    # Connection limits
    maxPendingOutboundBytes = 33554432  # 32 MiB — kill stalled clients
    autoPingSeconds = 55

    # Compression
    compression {
        enabled = true
        slidingWindow = true
    }

    # Query limits
    maxReqFilterSize = 200
    maxFilterLimit = 500
    maxTagsPerFilter = 3
    maxSubsPerConnection = 200

    # Threads
    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    # Negentropy sync (relay-to-relay)
    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}

events {
    maxEventSize = 5120          # 5KB — forces concision (~500 words markdown)
    maxNumTags = 200
    maxTagValSize = 1024

    rejectEventsNewerThanSeconds = 900      # 15 min future
    rejectEventsOlderThanSeconds = 94608000  # 3 years

    ephemeralEventsLifetimeSeconds = 300    # 5 min
}

dbParams {
    mapsize = 2147483648       # 2 GiB — keep ≤ RAM (strfry issue #57: LMDB thrashes when DB > RAM)
    maxreaders = 256
    noReadAhead = false
}
