services:
  strfry:
    build:
      context: .
      dockerfile: Dockerfile.strfry
    ports:
      - "7777:7777"
    volumes:
      - strfry-data:/app/strfry-db
    restart: unless-stopped

  search:
    build:
      context: .
      dockerfile: Dockerfile.search
    expose:
      - "8888"
    volumes:
      - strfry-data:/var/lib/strfry
    environment:
      - RELAY_URL=ws://strfry:7777
      - SEARCH_DB_PATH=/var/lib/strfry/search.db
      - NIP05_DB=/var/lib/strfry/nip05.db
      - POW_DB=/var/lib/strfry/pow_state.db
      - SEARCH_HOST=0.0.0.0
      - RELAY_DOMAIN=therustyclaw.com
    depends_on:
      - strfry
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - search
      - strfry
    restart: unless-stopped

volumes:
  strfry-data:
